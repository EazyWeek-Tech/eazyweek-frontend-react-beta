name: Sync Main to Deploy Repo via SSH

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      
      - name: Checkout source repo
        uses: actions/checkout@v4

      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

     
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      
      - name: Clone deploy repo
        run: |
          git clone git@github.com:AnkurBhayana/insight-react-frontend.git deploy-repo

      
      - name: Copy files excluding .github/workflows
        run: |
          rsync -av --exclude='.github/workflows/' --exclude='deploy-repo/' ./ deploy-repo/

      
      - name: Commit and push
        run: |
          cd deploy-repo
          git fetch origin main
          git merge origin/main --allow-unrelated-histories -m "Merge remote main before sync"
          git remote set-url origin git@github.com:AnkurBhayana/insight-react-frontend.git
          git add .
          git diff-index --quiet HEAD || git commit -m "Sync from source repo"
          git push origin main
