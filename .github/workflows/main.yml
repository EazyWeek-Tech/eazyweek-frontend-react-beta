name: Sync Main to Deploy Repo via SSH

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone deploy repo
        run: |
          git clone git@github.com:AnkurBhayana/insight-react-frontend.git deploy-repo

      - name: Sync files (exclude only .github/workflows)
        run: |
         rsync -av --delete \
          --exclude='.git/' \
          --exclude='deploy-repo/' \
          --exclude='.github/workflows/***' \
          --filter='P .github/workflows/' \
          ./ deploy-repo/


      - name: Commit and push changes safely
        run: |
          cd deploy-repo
          git fetch origin main
          git checkout main || git checkout -b main
          git add .
          git diff --quiet && echo "No changes to sync" && exit 0
          git commit -m "Sync from source repo on $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git pull origin main --rebase || git rebase --abort
          git push origin main
