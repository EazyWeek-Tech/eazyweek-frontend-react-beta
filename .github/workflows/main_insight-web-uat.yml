name: Build and deploy Node.js app to Azure Web App - insight-web-uat

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Show files (debug)
        run: |
          echo "Listing dist:"
          ls -la dist
          echo "Listing dist/assets:"
          ls -la dist/assets || true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CBD1D440906542108174C7FE11FFC1B5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DA497CB87C9C41A396E4D9C2DD8EA667 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_227C2D0483304F99A2E328A2F6D761B0 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "insight-web-uat"
          slot-name: "Production"
          package: dist
